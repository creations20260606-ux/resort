<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seafront Heritage Residence</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

:root{
    --gold:#d4af37;
}

body{
    font-family:Arial,sans-serif;
    overflow:hidden;
}

/* HERO */
.hero{
    height:100vh;
    background:url('background.jpg') center center/cover no-repeat;
    position:relative;
}

.hero::before{
    content:"";
    position:absolute;
    inset:0;
    background:linear-gradient(
        to bottom,
        rgba(0,0,0,.20),
        rgba(0,0,0,.45)
    );
}

/* NAVIGATION */
nav{
    position:absolute;
    top:30px;
    left:40px;
    z-index:3000;
}

.nav-links{
    display:flex;
    gap:28px;
    list-style:none;
}

.nav-links a{
    color:#fff;
    text-decoration:none;
    text-transform:uppercase;
    font-size:13px;
    letter-spacing:2px;
    font-weight:500;
    position:relative;
    transition:.3s ease;
}

/* Luxury underline */
.nav-links a::after{
    content:"";
    position:absolute;
    left:50%;
    bottom:-10px;

    width:0;
    height:4px;

    background:linear-gradient(
        90deg,
        #c89b3c,
        #d4af37,
        #f4e4a6
    );

    border-radius:999px;

    transform:translateX(-50%);
    transition:.35s ease;
}

.nav-links a:hover::after{
    width:100%;
}

/* Current page */
.nav-links a.active::after{
    width:100%;
}

/* HAMBURGER */
.hamburger{
    display:none;
    width:36px;
    height:28px;
    cursor:pointer;
    flex-direction:column;
    justify-content:space-between;
    z-index:5000;
}

.hamburger span{
    width:100%;
    height:2px;
    background:#fff;
    transition:.4s ease;
}

.hamburger.active span:nth-child(1){
    transform:translateY(13px) rotate(45deg);
}

.hamburger.active span:nth-child(2){
    opacity:0;
}

.hamburger.active span:nth-child(3){
    transform:translateY(-13px) rotate(-45deg);
}

/* HERO CONTENT */
.hero-block{
    position:relative;
    z-index:2;

    height:100vh;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    text-align:center;
    color:white;

    width:min(1000px,92vw);
    margin:auto;
}

.logo{
    width:100%;
    max-width:900px;
    height:auto;
    filter:drop-shadow(0 20px 40px rgba(0,0,0,.35));
}

.hero-title{
    width:75%;
    margin-top:10px;

    font-size:clamp(1.4rem,2vw,2.6rem);
    font-weight:300;
    letter-spacing:4px;
    text-transform:uppercase;
    line-height:1.15;
}

.hero-subtitle{
    margin-top:14px;

    font-size:clamp(1.2rem,1.8vw,1.8rem);
    letter-spacing:3px;
    opacity:.95;
}

/* MOBILE */
@media(max-width:992px){

    nav{
        top:24px;
        left:24px;
    }

    .hamburger{
        display:flex;
        position:fixed;
        top:24px;
        left:24px;
    }

    .nav-links{
        position:fixed;
        inset:0;

        flex-direction:column;
        justify-content:center;
        align-items:center;
        gap:34px;

        background:rgba(15,15,15,.10);

        backdrop-filter:
            blur(24px)
            saturate(180%);

        -webkit-backdrop-filter:
            blur(24px)
            saturate(180%);

        border:1px solid rgba(255,255,255,.06);

        opacity:0;
        visibility:hidden;

        transition:.45s ease;

        z-index:4000;
    }

    .nav-links::before{
        content:"";
        position:absolute;
        inset:0;

        background:
        linear-gradient(
            135deg,
            rgba(255,255,255,.08),
            rgba(255,255,255,.01)
        );

        pointer-events:none;
    }

    .nav-links.active{
        opacity:1;
        visibility:visible;
    }

    .nav-links li{
        opacity:0;
        transform:translateY(20px);
        transition:.4s ease;
    }

    .nav-links.active li{
        opacity:1;
        transform:translateY(0);
    }

    .nav-links a{
        font-size:1.6rem;
        font-weight:300;
        letter-spacing:5px;
    }

    .logo{
        width:92vw;
    }

    .hero-title{
        width:90%;
    }
}
</style>
</head>

<body>

<section class="hero">

    <nav>

        <div class="hamburger" id="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <ul class="nav-links" id="menu">
            <li><a href="index.html">Home</a></li>
            <li><a href="overview.html">Overview</a></li>
            <li><a href="gallery.html">Gallery</a></li>
            <li><a href="accommodation.html">Accommodation</a></li>
            <li><a href="amenities.html">Amenities</a></li>
            <li><a href="location.html">Location</a></li>
            <li><a href="reviews.html">Reviews</a></li>
            <li><a href="book.html">Book</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>

    </nav>

    <div class="hero-block">

        <img src="logo.png" class="logo" alt="Logo">

        <h1 class="hero-title">
            SEAFRONT HERITAGE RESIDENCE
        </h1>

        <p class="hero-subtitle">
            SKALA PATMOS • GREECE
        </p>

    </div>

</section>

<script>
const hamburger = document.getElementById('hamburger');
const menu = document.getElementById('menu');

hamburger.addEventListener('click', () => {
    hamburger.classList.toggle('active');
    menu.classList.toggle('active');
});

document.querySelectorAll('.nav-links a').forEach(link => {
    link.addEventListener('click', () => {
        hamburger.classList.remove('active');
        menu.classList.remove('active');
    });
});

/* Automatically underline current page */
const currentPage =
    window.location.pathname.split('/').pop() || 'index.html';

document.querySelectorAll('.nav-links a').forEach(link => {
    const href = link.getAttribute('href');

    if (href === currentPage) {
        link.classList.add('active');
    }
});
</script>

</body>
</html>
