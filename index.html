<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxury Villa Collection</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, sans-serif;
    overflow:hidden;
}

/* HERO */
.hero{
    height:100vh;
    background:url('background.jpg') center center/cover no-repeat;
    position:relative;
}

/* overlay */
.hero::before{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.35);
}

/* NAV */
nav{
    position:absolute;
    top:25px;
    left:30px;
    z-index:1000;
}

.nav-links{
    display:flex;
    gap:25px;
    list-style:none;
}

.nav-links a{
    color:#fff;
    text-decoration:none;
    text-transform:uppercase;
    font-size:14px;
    font-weight:600;
    letter-spacing:1px;
}

/* hamburger */
.hamburger{
    display:none;
    flex-direction:column;
    gap:5px;
    cursor:pointer;
}

.hamburger span{
    width:30px;
    height:3px;
    background:#fff;
    border-radius:5px;
}

/* CENTER BLOCK */
.hero-block{
    position:relative;
    z-index:2;
    height:100vh;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    text-align:center;
    color:white;

    width:min(900px,92vw);
    margin:0 auto;
}

/* LOGO */
.logo{
    width:100%;
    max-width:900px;
    height:auto;
    margin-bottom:8px;
    filter:drop-shadow(0 10px 30px rgba(0,0,0,.5));
}

/* HERO TITLE = 75% OF LOGO */
.hero-title{
    width:75%;
    margin:0 auto;

    font-size:clamp(1.2rem, 2vw, 2.4rem);  /* smaller */
    font-weight:300;
    letter-spacing:3px;
    text-transform:uppercase;
    line-height:1.1;
}

/* SUBTITLE */
.hero-subtitle{
    width:75%;
    margin:6px auto 0;

    font-size:clamp(0.9rem,1.3vw,1.1rem);
    line-height:1.5;
    letter-spacing:1px;
}

/* MOBILE */
@media (max-width: 992px){

    .hamburger{
        display:flex;
    }

    .nav-links{
        display:none;
        flex-direction:column;

        position:absolute;
        top:45px;
        left:0;

        background:rgba(0,0,0,.9);
        padding:20px;
        border-radius:10px;
        min-width:220px;
    }

    .nav-links.active{
        display:flex;
    }

    nav{
        top:20px;
        left:20px;
    }

    .logo{
        width:90vw;
    }
}
</style>
</head>

<body>

<section class="hero">

    <nav>
        <div class="hamburger" id="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <ul class="nav-links" id="menu">
            <li><a href="#">Home</a></li>
            <li><a href="#">Overview</a></li>
            <li><a href="#">Gallery</a></li>
            <li><a href="#">Accommodation</a></li>
            <li><a href="#">Amenities</a></li>
            <li><a href="#">Location</a></li>
            <li><a href="#">Reviews</a></li>
            <li><a href="#">Book</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>

    <div class="hero-block">

        <img src="logo.png" class="logo" alt="Logo">

        <h1 class="hero-title">SEAFRONT HERITAGE RESIDENCE</h1>

        <p class="hero-subtitle">
            SKALA PATMOS GREECE
        </p>

    </div>

</section>

<script>
const hamburger = document.getElementById('hamburger');
const menu = document.getElementById('menu');

hamburger.addEventListener('click', () => {
    menu.classList.toggle('active');
});
</script>

</body>
</html>
